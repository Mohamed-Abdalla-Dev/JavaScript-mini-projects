    <title>Create Our Works Filter</title>
    <link rel="stylesheet" href="main.css" />

  <body>

      <li data-cat=".realme">realme</li>
      <li data-cat=".samsung">samsung</li>

      <img class="all iphone" src="./image/iphone-1.jpg" alt="" />

      <img class="all iphone" src="./image/iphone-2.jpg" alt="" />
      <img class="all samsung" src="./image/samsung-2.jpg" alt="" />
      <img class="all iphone" src="./image/iphone-3.jpg" alt="" />
      <img class="all realme" src="./image/realme-2.jpg" alt="" />
      <img class="all realme" src="./image/realme-3.jpg" alt="" />
      <img class="all samsung" src="./image/samsung-1.jpg" alt="" />
      <img class="all samsung" src="./image/samsung-3.jpg" alt="" />
    </div>
    <script src="./main.js"></script>
